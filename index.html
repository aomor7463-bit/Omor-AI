<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাডমিন প্যানেল - মাদারগঞ্জ ব্লাড ডোনার সোসাইটি</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background-color: #f5f6fa;
            color: #2c3e50;
            padding: 20px;
        }
        .admin-container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        h1 {
            color: #e74c3c;
            margin-bottom: 20px;
            border-bottom: 2px solid #e74c3c;
            padding-bottom: 10px;
        }
        .dashboard-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #ffefe6;
            border-left: 5px solid #e74c3c;
            padding: 20px;
            border-radius: 8px;
            flex: 1;
        }
        .stat-card h3 {
            font-size: 16px;
            color: #7f8c8d;
        }
        .stat-card p {
            font-size: 32px;
            font-weight: bold;
            color: #e74c3c;
        }
        .table-responsive {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
        }
        th {
            background-color: #e74c3c;
            color: white;
        }
        tr:hover {
            background-color: #f9f9f9;
        }
        .btn-delete {
            background: #c0392b;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-delete:hover {
            background: #962d22;
        }
        #loginForm {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            text-align: center;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 15px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        button {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="loginForm">
        <h2>অ্যাডমিন লগইন</h2>
        <input type="password" id="adminPass" placeholder="পাসওয়ার্ড লিখুন">
        <button onclick="checkPassword()">প্রবেশ করুন</button>
    </div>

    <div id="adminDashboard" class="admin-container" style="display: none;">
        <h1>মাদারগঞ্জ ব্লাড ডোনার সোসাইটি - অ্যাডমিন প্যানেল</h1>
        
        <div class="dashboard-stats">
            <div class="stat-card">
                <h3>মোট নিবন্ধিত রক্তদাতা</h3>
                <p id="totalDonors">০</p>
            </div>
        </div>

        <h2>রক্তদাতাদের তালিকা</h2>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>নাম</th>
                        <th>গ্রুপ</th>
                        <th>মোবাইল</th>
                        <th>বয়স/ওজন</th>
                        <th>ঠিকানা</th>
                        <th>অ্যাকশন</th>
                    </tr>
                </thead>
                <tbody id="donorTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // আপনার ফায়ারবেস কনফিগারেশন
        const firebaseConfig = {
            apiKey: "AIzaSyABNl-z1-x4dmJfNHoZVQHqRE5XnRHeB10",
            authDomain: "omor-7f5b7.firebaseapp.com",
            databaseURL: "https://omor-7f5b7-default-rtdb.firebaseio.com",
            projectId: "omor-7f5b7",
            storageBucket: "omor-7f5b7.firebasestorage.app",
            messagingSenderId: "170819945184",
            appId: "1:170819945184:web:c81d2df8f5630199e44685"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // পাসওয়ার্ড চেক করার ফাংশন
        function checkPassword() {
            const pass = document.getElementById('adminPass').value;
            if(pass === "admin123") { // এখানে আপনার পছন্দের পাসওয়ার্ড দিতে পারেন
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('adminDashboard').style.display = 'block';
                loadAllDonors();
            } else {
                alert("ভুল পাসওয়ার্ড! আবার চেষ্টা করুন।");
            }
        }

        // সকল রক্তদাতার ডাটা লোড করার ফাংশন
        function loadAllDonors() {
            const tableBody = document.getElementById('donorTableBody');
            
            // ফায়ারবেসের 'donors' নোড থেকে ডেটা নেওয়া
            database.ref('donors').on('value', (snapshot) => {
                tableBody.innerHTML = "";
                let count = 0;

                if(snapshot.exists()) {
                    // ফায়ারবেস ডাটা স্ট্রাকচার অনুযায়ী লুপ চালানো (Group -> District -> Upazila -> Donor)
                    snapshot.forEach((groupSnapshot) => {
                        groupSnapshot.forEach((districtSnapshot) => {
                            districtSnapshot.forEach((upazilaSnapshot) => {
                                upazilaSnapshot.forEach((donorSnapshot) => {
                                    const donor = donorSnapshot.val();
                                    const donorKey = donorSnapshot.key;
                                    const path = `donors/${groupSnapshot.key}/${districtSnapshot.key}/${upazilaSnapshot.key}/${donorKey}`;
                                    count++;

                                    let row = `<tr>
                                        <td>${donor.name}<br><small style="color:#7f8c8d">পিতা: ${donor.father}</small></td>
                                        <td style="font-weight:bold; color:#e74c3c">${donor.group}</td>
                                        <td>${donor.phone}</td>
                                        <td>${donor.age} বছর, ${donor.weight}</td>
                                        <td>${donor.address}, ${donor.upazilaRaw}, ${donor.district}</td>
                                        <td><button class="btn-delete" onclick="deleteDonor('${path}')">ডিলিট</button></td>
                                    </tr>`;
                                    
                                    tableBody.innerHTML += row;
                                });
                            });
                        });
                    });
                }
                
                document.getElementById('totalDonors').innerText = count;
                if(count === 0) {
                    tableBody.innerHTML = "<tr><td colspan='6' style='text-align:center;'>কোনো রক্তদাতার তথ্য পাওয়া যায়নি।</td></tr>";
                }
            });
        }

        // রক্তদাতার ডাটা ডিলিট করার ফাংশন
        function deleteDonor(path) {
            if(confirm("আপনি কি নিশ্চিতভাবে এই রক্তদাতার তথ্যটি ডিলিট করতে চান?")) {
                database.ref(path).remove()
                .then(() => {
                    alert("তথ্য সফলভাবে ডিলিট করা হয়েছে।");
                })
                .catch((error) => {
                    alert("ডিলিট করতে সমস্যা হয়েছে: " + error.message);
                });
            }
        }
    </script>
    <script src="https://pl29840351.effectivecpmnetwork.com/0c/e9/c0/0ce9c0cfaa45be098852e284428f7711.js"></script>

</body>
</html>
